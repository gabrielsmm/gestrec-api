name: gestrec

services:
  # Reverse proxy e load balancer
  nginx:
    image: nginx:1.29
    container_name: gestrec-nginx
    ports:
      - "80:80" # Porta externa:interna - acesso via http://localhost
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro # :ro = read-only
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro # Basic auth para Swagger
      - ./nginx/html:/usr/share/nginx/html:ro # Página de boas-vindas e error pages
    depends_on:
      - api
    networks:
      - gestrec-network
    restart: unless-stopped

  # API Spring Boot
  api:
    build: . # Usa o Dockerfile na raiz do projeto
    expose:
      - "8080" # Expõe apenas internamente
    env_file:
      - .env # Carrega variáveis
    depends_on:
      - db # Aguarda o banco estar no ar
    networks:
      - gestrec-network
    restart: unless-stopped

  # Banco de dados PostgreSQL
  db:
    image: postgres:18.1
    container_name: gestrec-db
    environment:
      POSTGRES_DB: gestrec
      POSTGRES_USER: ${DATABASE_USERNAME} # Variável do arquivo .env
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql # Persiste dados mesmo após container ser removido
    networks:
      - gestrec-network

volumes:
  postgres-data: # Volume nomeado gerenciado pelo Docker

networks:
  gestrec-network: # Rede interna para comunicação entre containers
