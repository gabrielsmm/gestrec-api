name: gestrec

services:
  nginx:
    image: nginx:1.29
    container_name: gestrec-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - gestrec-network
    restart: unless-stopped

  api:
    build: .
    expose:
      - "8080"
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - gestrec-network
    restart: unless-stopped

  db:
    image: postgres:18.1
    environment:
      POSTGRES_DB: gestrec
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql
    networks:
      - gestrec-network

volumes:
  postgres-data:

networks:
  gestrec-network: