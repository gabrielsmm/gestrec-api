events {
    worker_connections 1024;
}

http {
    # Load balancing: distribui requisições entre instâncias da API
    upstream api_backend {
        least_conn; # prioriza servidores com menos conexões ativas
        server api:8080 max_fails=3 fail_timeout=30s;
    }

    # Rate Limiting: limita a 5 requisições por segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Compressão GZIP: comprime respostas para reduzir tráfego de rede
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_vary on;
    gzip_types application/json text/plain text/css application/javascript text/xml application/xml;

    # Cache: armazena respostas em disco (100MB, expira após 60min de inatividade)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_cache:10m max_size=100m inactive=60m use_temp_path=off;

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log;
        error_log /var/log/nginx/error.log;

        # Limite de payload: máximo de 1MB para upload, retorna HTTP 413 se exceder
        client_max_body_size 1m;

        # Timeouts para conexão com o backend
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering: melhora performance armazenando respostas antes de enviar ao cliente
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        # Rotas da API
        location / {
            # Rate Limiting: permite burst de 10 requisições, depois bloqueia com HTTP 429
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # Headers de segurança
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # Proxy: encaminha requisições para o backend
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Cache: ativa para requisições GET/HEAD
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 5m;
            proxy_cache_valid 404 1m;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_bypass $http_cache_control;
            add_header X-Cache-Status $upstream_cache_status;

            # Não cachear requisições autenticadas
            proxy_no_cache $cookie_JSESSIONID;
        }

        # Health check do nginx
        location = /health {
            access_log off;
            add_header Content-Type application/json;
            return 200 '{"service": "nginx", "status": "ok"}';
        }
    }
}
