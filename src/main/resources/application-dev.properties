spring.datasource.url=jdbc:postgresql://localhost:5432/gestrec
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.generate-ddl=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# Configuracao do Flyway para gerenciar as migracoes do banco de dados
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.clean-disabled=false
spring.flyway.clean-on-validation-error=true

#logging.level.org.flywaydb=DEBUG

# Configuracao do servidor para o Swagger UI
app.swagger.server.url=http://localhost:8080
app.swagger.server.description=Ambiente de Desenvolvimento