events {
    worker_connections 1024;
}

http {
    # Load balancing: distribui requisições entre instâncias da API
    upstream api_backend {
        least_conn; # prioriza servidores com menos conexões ativas
        server api:8080;
    }

    # Rate Limiting: limita a 5 requisições por segundo por IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=5r/s;

    # Compressão GZIP: comprime respostas para reduzir tráfego
    gzip on;
    gzip_types application/json text/plain;

    # Log estruturado: formato customizado com IP, método, URI, status e tempo
    log_format custom '$remote_addr | $request_method $uri | $status | upstream_time=${upstream_response_time}s | total_time=${request_time}s';

    # Cache básico: armazena respostas GET em memória (10MB)
    proxy_cache_path /var/cache/nginx keys_zone=api_cache:10m max_size=10m inactive=10m;

    server {
        listen 80;
        server_name localhost;

        access_log /var/log/nginx/access.log custom;
        error_log /var/log/nginx/error.log;

        # Limite de payload: máximo de 1MB
        client_max_body_size 1m;

        location / {
            # Rate Limiting: burst de 10 requisições
            limit_req zone=api_limit burst=10 nodelay;
            limit_req_status 429;

            # Headers de segurança
            add_header X-Content-Type-Options "nosniff" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-XSS-Protection "1; mode=block" always;

            # Proxy para o backend
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Cache: apenas requisições GET por 10 segundos
            proxy_cache api_cache;
            proxy_cache_methods GET HEAD;
            proxy_cache_valid 200 10s;

            # Não cachear requisições autenticadas
            proxy_cache_bypass $http_authorization;
            proxy_no_cache $http_authorization;

            add_header X-Cache-Status $upstream_cache_status;
        }

        # Basic Auth para Swagger UI
        location /swagger-ui.html {
            auth_basic "Swagger Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /swagger-ui/ {
            auth_basic "Swagger Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /v3/api-docs {
            auth_basic "Swagger Documentation";
            auth_basic_user_file /etc/nginx/.htpasswd;

            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Health check
        location = /health {
            access_log off;
            return 200 '{"service": "nginx", "status": "ok"}';
        }
    }
}
